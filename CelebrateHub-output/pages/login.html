<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — CelebrateHub</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/auth.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <span class="auth-logo logo">Celebrate<span>Hub</span></span>
    <h2>Welcome Back</h2>
    <p class="auth-subtitle">Enter your email to receive a secure OTP</p>
    <div id="login-alert"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')requestLoginOTP()">
    </div>
    <div class="form-group" id="otp-section" style="display:none;">
      <label>OTP (One-Time Password)</label>
      <div class="otp-group">
        <input type="text" id="login-otp" placeholder="Enter 6-digit OTP" maxlength="6" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn-send-otp" onclick="requestLoginOTP()" id="resend-btn" style="display:none;">Resend</button>
      </div>
      <p class="otp-note" id="otp-hint"></p>
    </div>
    <button class="btn-full" id="send-otp-btn" onclick="requestLoginOTP()">Send OTP →</button>
    <button class="btn-full" id="login-btn" style="display:none;" onclick="doLogin()">Login →</button>
    <div class="auth-switch">Don't have an account? <a href="register.html">Register here</a></div>
    <a class="back-link" href="index.html">← Back to Home</a>
  </div>
</div>

<!-- Load state.js FIRST — it provides API_BASE and apiFetch globally -->
<script src="../js/state.js"></script>
<script>
async function requestLoginOTP() {
  const email   = document.getElementById('login-email').value.trim();
  const alertEl = document.getElementById('login-alert');
  const hint    = document.getElementById('otp-hint');

  if (!email) {
    alertEl.innerHTML = '<div class="alert alert-error">Please enter your email address.</div>'; return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alertEl.innerHTML = '<div class="alert alert-error">Please enter a valid email address.</div>'; return;
  }

  alertEl.innerHTML = '<div class="alert alert-info">⏳ Sending OTP...</div>';

  const res = await apiFetch('/auth/send-otp', {
    method: 'POST',
    body: JSON.stringify({ email })
  });

  if (!res.ok) {
    alertEl.innerHTML = '<div class="alert alert-error">' + (res.data.message || 'Failed to send OTP.') + '</div>'; return;
  }

  alertEl.innerHTML = '';

  // Show OTP input section
  document.getElementById('otp-section').style.display  = 'block';
  document.getElementById('send-otp-btn').style.display = 'none';
  document.getElementById('login-btn').style.display    = 'block';
  document.getElementById('resend-btn').style.display   = 'inline-block';

  if (res.data.demo) {
    hint.innerHTML = '⚠️ Demo mode — OTP: <strong>' + (res.data.otp || '123456') + '</strong>';
  } else {
    hint.innerHTML = '✅ OTP sent to <strong>' + email + '</strong>. Check your inbox (and spam folder).';
  }

  document.getElementById('login-email').disabled = true;
  document.getElementById('login-otp').focus();
}

async function doLogin() {
  const email   = document.getElementById('login-email').value.trim();
  const otp     = document.getElementById('login-otp').value.trim();
  const alertEl = document.getElementById('login-alert');

  if (!email || !otp) {
    alertEl.innerHTML = '<div class="alert alert-error">Please enter your email and OTP.</div>'; return;
  }

  alertEl.innerHTML = '<div class="alert alert-info">⏳ Logging in...</div>';

  const res = await apiFetch('/auth/login', {
    method: 'POST',
    body: JSON.stringify({ email, otp })
  });

  if (!res.ok) {
    alertEl.innerHTML = '<div class="alert alert-error">' + (res.data.message || 'Login failed.') + '</div>'; return;
  }

  const token = res.data.token;
  const user  = res.data.data;
  setToken(token);
  saveSession(user, user.role || 'user');

  alertEl.innerHTML = '<div class="alert alert-success">✅ Login successful! Redirecting...</div>';
  setTimeout(function() { window.location.href = 'role.html'; }, 1000);
}
</script>
</body>
</html>
