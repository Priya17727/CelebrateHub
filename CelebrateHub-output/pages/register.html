<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register ŌĆö CelebrateHub</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/auth.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <span class="auth-logo logo">Celebrate<span>Hub</span></span>
    <h2>Create Account</h2>
    <p class="auth-subtitle">Join thousands of happy celebrants today!</p>
    <div id="register-alert"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="reg-username" placeholder="Choose a unique username">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="reg-email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Mobile Number</label>
      <input type="tel" id="reg-mobile" placeholder="+91 98765 43210">
    </div>
    <div class="form-group">
      <label>OTP Verification</label>
      <div class="otp-group">
        <input type="text" id="reg-otp" placeholder="Enter 6-digit OTP" maxlength="6">
        <button class="btn-send-otp" onclick="sendOTP()">Send OTP</button>
      </div>
      <p class="otp-note" id="otp-hint"></p>
    </div>
    <button class="btn-full" onclick="doRegister()">Create Account ­¤Äē</button>
    <div class="auth-switch">Already have an account? <a href="login.html">Login here</a></div>
    <a class="back-link" href="index.html">ŌåÉ Back to Home</a>
  </div>
</div>

<script src="../js/state.js"></script>
<script>
async function sendOTP() {
  var email   = document.getElementById('reg-email').value.trim();
  var hint    = document.getElementById('otp-hint');
  var alertEl = document.getElementById('register-alert');

  alertEl.innerHTML = '';

  if (!email) {
    alertEl.innerHTML = '<div class="alert alert-error">Please enter your email address first ŌĆö OTP will be sent to your email.</div>';
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alertEl.innerHTML = '<div class="alert alert-error">Please enter a valid email address.</div>';
    return;
  }

  hint.innerHTML = 'ŌÅ│ Sending OTP to ' + email + '...';

  var res = await apiFetch('/auth/send-otp', {
    method: 'POST',
    body: JSON.stringify({ email: email })
  });

  if (!res.ok) {
    hint.innerHTML = 'ŌØī ' + (res.data.message || 'Failed to send OTP.');
    return;
  }

  hint.innerHTML = 'Ō£ģ OTP sent to <strong>' + email + '</strong>. Check your inbox (and spam folder).';
}

async function doRegister() {
  var username = document.getElementById('reg-username').value.trim();
  var email    = document.getElementById('reg-email').value.trim();
  var mobile   = document.getElementById('reg-mobile').value.trim();
  var otp      = document.getElementById('reg-otp').value.trim();
  var alertEl  = document.getElementById('register-alert');

  if (!username || !email || !mobile || !otp) {
    alertEl.innerHTML = '<div class="alert alert-error">Please fill all fields.</div>';
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alertEl.innerHTML = '<div class="alert alert-error">Please enter a valid email.</div>';
    return;
  }

  alertEl.innerHTML = '<div class="alert alert-info">ŌÅ│ Creating account...</div>';

  var res = await apiFetch('/auth/register', {
    method: 'POST',
    body: JSON.stringify({ username: username, email: email, mobile: mobile, otp: otp })
  });

  if (!res.ok) {
    alertEl.innerHTML = '<div class="alert alert-error">' + (res.data.message || 'Registration failed.') + '</div>';
    return;
  }

  alertEl.innerHTML = '<div class="alert alert-success">­¤Äē Account created! Redirecting to login...</div>';
  setTimeout(function() { location.href = 'login.html'; }, 1800);
}
</script>
</body>
</html>
